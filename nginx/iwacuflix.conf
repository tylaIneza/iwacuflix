# /etc/nginx/sites-available/iwacuflix
# sudo ln -sf /etc/nginx/sites-available/iwacuflix /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;   # <-- replace with your domain

    client_max_body_size 500M;

    add_header X-Frame-Options      "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"     always;

    # Everything goes to the single Next.js app on port 3000
    # (API routes, pages, uploads — all handled by Next.js)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
